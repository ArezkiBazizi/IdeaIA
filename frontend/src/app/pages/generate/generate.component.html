<section class="card wide">
  <h1>Générer un projet</h1>
  <p class="muted">L’IA structure ton idée (flux SSE) puis enregistre le projet en base.</p>

  <label for="idea">Idée</label>
  <textarea id="idea" [(ngModel)]="idea" rows="6" placeholder="Ex : une app de suivi d’habitudes…"></textarea>

  <label for="uid">User ID (optionnel, UUID)</label>
  <input id="uid" type="text" [(ngModel)]="userId" placeholder="Si tu as créé un utilisateur via POST /api/users" />

  <div class="actions">
    <button type="button" class="btn" (click)="run()" [disabled]="busy">Générer</button>
    <a routerLink="/" class="btn ghost">Accueil</a>
  </div>

  @if (error) {
    <p class="err">{{ error }}</p>
  }

  @if (streaming) {
    <h2>Flux modèle</h2>
    <pre class="stream">{{ streaming }}</pre>
  }

  @if (savedId) {
    <p class="ok">
      Projet enregistré.
      <a [routerLink]="['/project', savedId]">Ouvrir le projet</a>
    </p>
  }
</section>
