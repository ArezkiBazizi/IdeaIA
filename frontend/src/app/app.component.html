<div class="shell">
  <header class="top">
    <a routerLink="/" class="brand brand-font">Idea-to-Action</a>
    <div class="top-actions">
      <button
        type="button"
        class="theme-btn"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.dark() ? 'Passer en mode clair' : 'Passer en mode sombre'"
      >
        {{ theme.dark() ? '☀' : '☾' }}
      </button>
    </div>
  </header>
  <main class="main">
    <router-outlet />
  </main>
</div>
